name = "aipictors"
compatibility_date = "2024-11-11"
main = "./build/worker/index.js"
assets = { directory = "./build/client" }

# Pages Functions 実行時の ctx.env に渡す環境変数（ローカル: wrangler pages dev など）
[vars]
VITE_GRAPHQL_ENDPOINT = "https://aipics.fly.dev"
VITE_GRAPHQL_ENDPOINT_REMIX = "https://aipics.fly.dev"
AIPICTORS_API_BASE_URL = "https://backend.aipictors.com"

# Server-side secrets/vars for points payment API.
# Set these in Cloudflare dashboard (Pages project > Settings > Variables) for production.
# STRIPE_SECRET_KEY = ""
# AIPICTORS_API_INTERNAL_TOKEN = ""
# AIPICTORS_API_CF_ACCESS_CLIENT_ID = ""
# AIPICTORS_API_CF_ACCESS_CLIENT_SECRET = ""

[observability]
enabled = true
